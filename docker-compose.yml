services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: novel_agent
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novel
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel -d novel_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
    environment:
      NOVEL_AGENT_DATABASE_URL: postgresql+psycopg://novel:novel@postgres:5432/novel_agent
      NOVEL_AGENT_MODEL_PROVIDER: mock
      NOVEL_AGENT_RETRIEVAL_BACKEND: qdrant
      NOVEL_AGENT_QDRANT_URL: http://qdrant:6333
      NOVEL_AGENT_QDRANT_COLLECTION: novel_agent_memory
      NOVEL_AGENT_EMBEDDING_PROVIDER: sentence_transformers
      NOVEL_AGENT_EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      NOVEL_AGENT_EMBEDDING_DIMENSION: 384
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  qdrant_storage:
