services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: novel_agent
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novel
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel -d novel_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NOVEL_AGENT_DATABASE_URL: postgresql+psycopg://novel:novel@postgres:5432/novel_agent
      NOVEL_AGENT_MODEL_PROVIDER: mock
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
